<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Randomizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .team-card { border-top: 4px solid; }
        .team-0 { border-top-color: #ffc107; }
        .team-1 { border-top-color: #0d6efd; }
        .team-2 { border-top-color: #dc3545; }
        .team-0 .team-header { color: #ffc107; }
        .team-1 .team-header { color: #0d6efd; }
        .team-2 .team-header { color: #dc3545; }
        .team-dot-0 { color: #ffc107; }
        .team-dot-1 { color: #0d6efd; }
        .team-dot-2 { color: #dc3545; }
        textarea { font-family: monospace; font-size: 0.85rem; }
        .player-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
        .player-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container py-4" style="max-width: 800px;">
        <h2 class="text-center mb-4">Team Randomizer</h2>

        <!-- JSON Input -->
        <div class="card mb-4">
            <div class="card-body">
                <label class="form-label fw-bold">Players JSON</label>
                <textarea class="form-control mb-3" id="json-input" rows="10">[
  {"name": "Темирлан", "score": 5.0},
  {"name": "Абай", "score": 4.75},
  {"name": "Акберди", "score": 4.25},
  {"name": "Арман", "score": 3.5},
  {"name": "Манас", "score": 3.25},
  {"name": "Бейбарыс", "score": 3.0},
  {"name": "Олжас", "score": 2.75},
  {"name": "Болатбек", "score": 2.75},
  {"name": "Абылай", "score": 2.75},
  {"name": "Мирас", "score": 2.5},
  {"name": "Еркебулан", "score": 2.5},
  {"name": "Елдос", "score": 2.25},
  {"name": "Думан", "score": 2.0},
  {"name": "Ильяс", "score": 1.5},
  {"name": "Едіге", "score": 1.25},
  {"name": "Темирлан JR", "score": 1.0},
  {"name": "Ерболат", "score": 1.0},
  {"name": "Батыр", "score": 1.0}
]</textarea>
                <div id="error-msg" class="text-danger mb-2" style="display:none;"></div>
                <button class="btn btn-primary w-100 btn-lg" onclick="randomize()">Randomize Teams</button>
            </div>
        </div>

        <!-- Results -->
        <div class="row g-3" id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const teamNames = [
            { emoji: '\u{1F7E1}', label: 'Команда 1' },
            { emoji: '\u{1F535}', label: 'Команда 2' },
            { emoji: '\u{1F534}', label: 'Команда 3' }
        ];

        function randomize() {
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';

            let players;
            try {
                players = JSON.parse(document.getElementById('json-input').value);
                if (!Array.isArray(players) || players.length < 3) throw new Error('Need at least 3 players');
                players.forEach(p => {
                    if (typeof p.name !== 'string' || typeof p.score !== 'number' || p.score < 0 || p.score > 5) {
                        throw new Error(`Invalid player: ${JSON.stringify(p)}`);
                    }
                });
            } catch (e) {
                errEl.textContent = e.message;
                errEl.style.display = 'block';
                return;
            }

            const teams = balanceTeams(players);
            renderTeams(teams);
        }

        function balanceTeams(players) {
            // Sort descending by score
            const sorted = [...players].sort((a, b) => b.score - a.score);

            // Greedy assignment: for each player (strongest first),
            // assign to the team with the lowest current sum.
            // Add randomness by shuffling teams with equal sums.
            const teams = [[], [], []];
            const sums = [0, 0, 0];

            for (const player of sorted) {
                // Find min sum
                const minSum = Math.min(...sums);
                // Get all team indices with that min sum and pick randomly
                const candidates = sums
                    .map((s, i) => ({ s, i }))
                    .filter(x => x.s === minSum)
                    .map(x => x.i);
                const pick = candidates[Math.floor(Math.random() * candidates.length)];

                teams[pick].push(player);
                sums[pick] += player.score;
            }

            // Shuffle order of teams for extra randomness
            const indices = [0, 1, 2];
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }

            return indices.map(i => ({
                players: teams[i],
                total: sums[i]
            }));
        }

        function renderTeams(teams) {
            const container = document.getElementById('results');
            container.innerHTML = teams.map((team, i) => `
                <div class="col-md-4">
                    <div class="card team-card team-${i} h-100">
                        <div class="card-body">
                            <h5 class="team-header fw-bold mb-1">
                                ${teamNames[i].emoji} ${teamNames[i].label}
                            </h5>
                            <div class="text-muted mb-3" style="font-size:.9rem">
                                Total: ${team.total.toFixed(2)}
                            </div>
                            ${team.players.map(p => `
                                <div class="player-row">
                                    <span>${p.name}</span>
                                    <span class="text-muted">${p.score.toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
